name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Build package
        run: make package checksums ARCH=${{ matrix.arch }}
      - name: Import GPG key
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        run: |
          printf '%s' "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
      - name: Sign package
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        run: make sign ARCH=${{ matrix.arch }}
      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.tar.gz.asc
